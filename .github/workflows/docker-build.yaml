name: Build and Push Docker Images

# This workflow builds and pushes Docker images to GitHub Container Registry (ghcr.io/zirain).
# It builds multi-platform Linux images (amd64, arm64) and Windows images (amd64).
# Triggered on:
#   - Push to main branch (tags images with commit SHA)
#   - Version tags (v*) (tags images with version number)
#   - Manual workflow dispatch

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zirain/go-httpbin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git rev-parse --short HEAD)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "docker_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
      
      - name: Build and push images
        run: make image.push
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          DOCKER_TAG: ${{ steps.meta.outputs.docker_tag }}
      
      - name: Tag and push latest
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Tagging images as latest..."
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ steps.meta.outputs.docker_tag }}
          docker buildx imagetools create -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-windows \
            ${{ steps.meta.outputs.docker_tag }}-windows
      
      - name: Summary
        run: |
          echo "## Docker Images Built and Pushed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.docker_tag }}\` (linux/amd64, linux/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta.outputs.docker_tag }}-windows\` (windows/amd64)" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-windows\`" >> $GITHUB_STEP_SUMMARY
          fi
